name: Build macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npm run rebuild

      - name: Create .env from secrets
        run: |
          cat > .env <<EOF
          CATDB_AUTH_HOST=${{ secrets.CATDB_AUTH_HOST }}
          CATDB_AUTH_PORT=${{ secrets.CATDB_AUTH_PORT }}
          CATDB_AUTH_USER=${{ secrets.CATDB_AUTH_USER }}
          CATDB_AUTH_PASSWORD=${{ secrets.CATDB_AUTH_PASSWORD }}
          CATDB_AUTH_DATABASE=${{ secrets.CATDB_AUTH_DATABASE }}
          CATDB_AUTH_SSL=${{ secrets.CATDB_AUTH_SSL }}
          CATDB_AUTH_SSH_HOST=${{ secrets.CATDB_AUTH_SSH_HOST }}
          CATDB_AUTH_SSH_PORT=${{ secrets.CATDB_AUTH_SSH_PORT }}
          CATDB_AUTH_SSH_USER=${{ secrets.CATDB_AUTH_SSH_USER }}
          CATDB_AUTH_SSH_PASSWORD=${{ secrets.CATDB_AUTH_SSH_PASSWORD }}
          CATDB_AUTH_SSH_KEEP_ALIVE=${{ secrets.CATDB_AUTH_SSH_KEEP_ALIVE }}
          EOF

      - name: Build distributable
        run: npm run dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: catdb-mac
          path: |
            release/*.dmg
            release/*.zip
          if-no-files-found: error
